[phases.setup]
nixPkgs = ["nodejs-24_x", "pnpm-9_x", "openssl"]

[phases.install]
cmds = ["pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = ["cd artifacts/api-server && pnpm build"]

[start]
# Run API server and batch worker as sibling processes.
# The worker handles: email polling (IMAP), job processing, and nightly digest.
# If the worker crashes it does not take down the API server, and vice versa.
cmd = "node --enable-source-maps artifacts/api-server/dist/index.mjs & node --enable-source-maps artifacts/api-server/dist/worker.mjs & wait"
